{% extends "store/layout.html" %}
{% load static %}

{% block body %}
<section class="login-page py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-5">
                <div class="login-card row mb-4">
                    <h2 class="mb-4 text-center">Sing up</h2>

                    {% if message %}
                        <div class="alert alert-danger" role="alert">{{ message }}</div>
                    {% endif %}
                      <form action="{% url 'register' %}" method="post">
                            {% csrf_token %}
                            <div class="form-group" style='margin: 2%;'>
                                <input class="form-control" autofocus type="text" name="username" placeholder="Username">
                            </div>
                            <div class="form-group" style='margin: 2%;'>
                                <input class="form-control" type="email" name="email" placeholder="Email Address">
                            </div>
                            <div class="form-group" style='margin: 2%;'>
                                <input class="form-control" type="password" name="password" placeholder="Password">
                            </div>
                            <div class="form-group" style='margin: 2%;'>
                                <input class="form-control" type="password" name="confirmation" placeholder="Confirm Password">
                            </div>
                             <button class="btn btn-primary" type="submit" style="margin-left:40%;">Register</button>
                                
                            
                        </form>
                    

                
                        
                    </div>
                    <div class=mb-4 text-center style="margin-left:19%;">
                        Already have an account? <a href="{% url 'login' %}">Log In here.</a>
                    </div>
            </div>
        </div>
    </div>
</section>


{% endblock %}
