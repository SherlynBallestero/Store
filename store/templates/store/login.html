{% extends "store/layout.html" %}
{% load static %}

{% block body %}
<section class="login-page py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-5">
                <div class="login-card">
                    <h2 class="mb-4 text-center">Login</h2>

                    {% if message %}
                        <div class="alert alert-danger" role="alert">{{ message }}</div>
                    {% endif %}

                    <form action="{% url 'login' %}" method="post" class="d-grid gap-3">
                        {% csrf_token %}
                        <div>
                            <input autofocus class="form-control" type="text" name="username" placeholder="Username">
                        </div>
                        <div>
                            <input class="form-control" type="password" name="password" placeholder="Password">
                        </div>
                        <button class="btn btn-primary" type="submit">Login</button>
                    </form>

                    <p class="mt-3 mb-0 text-center">Don't have an account? <a href="{% url 'register' %}">Register here.</a></p>
                </div>
            </div>
        </div>
    </div>
</section>


{% endblock %}
